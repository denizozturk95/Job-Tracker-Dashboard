name: JobTracker
options:
  bundleIdPrefix: com.deniz
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_EMIT_LOC_STRINGS: "YES"

targets:
  JobTracker:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: JobTracker
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deniz.jobtracker
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "JobTracker adds your interviews to your calendar so you never miss one."
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Job Tracker"
        INFOPLIST_KEY_UIBackgroundModes: "fetch processing"
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: "com.deniz.jobtracker.ghostingScan com.deniz.jobtracker.weeklyDigest"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: JobTracker/JobTracker.entitlements
    dependencies:
      - target: JobTrackerWidgets
      - target: JobTrackerShare

  JobTrackerWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: JobTrackerWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deniz.jobtracker.widgets
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: JobTrackerWidgets/Info.plist
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: JobTrackerWidgets/JobTrackerWidgets.entitlements

  JobTrackerShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: JobTrackerShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deniz.jobtracker.share
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: JobTrackerShare/Info.plist
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: JobTrackerShare/JobTrackerShare.entitlements

  JobTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: JobTrackerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deniz.jobtracker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/JobTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/JobTracker"
    dependencies:
      - target: JobTracker
